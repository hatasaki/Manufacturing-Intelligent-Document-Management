<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturing Intelligent Document Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="login-screen">
            <div class="login-card">
                <h1>Manufacturing Intelligent<br>Document Management</h1>
                <p>Sign in with your Microsoft account to continue</p>
                <button id="btn-login" class="btn btn-primary">Sign in with Microsoft</button>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="main-app hidden">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <h1>Manufacturing Intelligent Document Management</h1>
                </div>
                <div class="header-center">
                    <select id="channel-select" class="channel-select" disabled>
                        <option value="">Select a Teams Channel...</option>
                    </select>
                </div>
                <div class="header-right">
                    <span id="user-name" class="user-name"></span>
                </div>
            </header>

            <!-- Content -->
            <div class="content">
                <!-- Left Pane: File List -->
                <div class="pane pane-left">
                    <h2>Files</h2>
                    <div id="file-list" class="file-list">
                        <p class="placeholder-text">Select a Teams channel to view files</p>
                    </div>
                    <div id="drop-zone" class="drop-zone hidden">
                        <div class="drop-zone-content">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <p>Drag & drop PDF files here to upload</p>
                        </div>
                    </div>
                </div>

                <!-- Right Pane: File Details -->
                <div class="pane pane-right">
                    <div id="file-details" class="file-details">
                        <p class="placeholder-text">Select a file to view details</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Follow-up Questions Modal -->
        <div id="question-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Follow-up Questions</h2>
                    <button id="btn-close-modal" class="btn-close">&times;</button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"
            crossorigin="anonymous"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
