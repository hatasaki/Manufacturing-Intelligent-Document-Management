# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: manufacturing-smart-doc-mgmt
metadata:
  template: manufacturing-smart-doc-mgmt
hooks:
  # ── preprovision: purge soft-deleted resources that block redeployment ──
  preprovision:
    windows:
      shell: pwsh
      run: |
        $location = (azd env get-value AZURE_LOCATION)
        $envName = (azd env get-value AZURE_ENV_NAME)
        $deleted = az cognitiveservices account list-deleted --query "[?contains(name, '$envName')]" -o json 2>$null | ConvertFrom-Json
        foreach ($acct in $deleted) {
          $n = $acct.name; $rg = ($acct.id -split '/resourceGroups/')[1] -split '/' | Select-Object -First 1
          Write-Host "Purging soft-deleted Cognitive Services: $n"
          az cognitiveservices account purge --name $n --resource-group $rg --location $location 2>$null
        }
    posix:
      shell: sh
      run: |
        LOCATION=$(azd env get-value AZURE_LOCATION)
        ENV_NAME=$(azd env get-value AZURE_ENV_NAME)
        for ID in $(az cognitiveservices account list-deleted --query "[?contains(name, '$ENV_NAME')].id" -o tsv 2>/dev/null); do
          NAME=$(echo "$ID" | grep -oP 'deletedAccounts/\K[^/]+')
          RG=$(echo "$ID" | grep -oP 'resourceGroups/\K[^/]+')
          echo "Purging soft-deleted Cognitive Services: $NAME"
          az cognitiveservices account purge --name "$NAME" --resource-group "$RG" --location "$LOCATION" 2>/dev/null
        done

  # ── postdeploy: runs AFTER both provision and deploy are complete ──
  # This ensures all Azure resources exist and code is deployed before
  # configuring CU defaults, creating agents, and creating the vector container.
  postdeploy:
    windows:
      shell: pwsh
      run: |
        $rgName = (azd env get-value AZURE_RESOURCE_GROUP)

        # 0. Deploy MCP server via management-plane API (avoids blob RBAC requirement)
        Write-Host "=== Deploying MCP server ==="
        $mcpFuncName = (azd env get-value MCP_FUNCTION_APP_NAME)
        $mcpZip = Join-Path $env:TEMP "mcp-server-deploy.zip"
        if (Test-Path $mcpZip) { Remove-Item $mcpZip }
        Push-Location src/mcp-server
        Compress-Archive -Path * -DestinationPath $mcpZip -Force
        Pop-Location
        az functionapp deployment source config-zip --resource-group $rgName --name $mcpFuncName --src $mcpZip --build-remote true
        if ($LASTEXITCODE -ne 0) { Write-Host "WARNING: MCP server deployment failed" } else { Write-Host "=== MCP server deployed ===" }
        Remove-Item $mcpZip -ErrorAction SilentlyContinue

        # 1. Configure Content Understanding default model deployments
        Write-Host "=== Configuring Content Understanding defaults ==="
        $cuEndpoint = (azd env get-value AI_FOUNDRY_ENDPOINT)
        $token = (az account get-access-token --resource "https://cognitiveservices.azure.com" --query accessToken -o tsv)
        $cuBodyPath = [System.IO.Path]::GetTempFileName()
        Set-Content -Path $cuBodyPath -Value '{"modelDeployments":{"gpt-4.1":"gpt-41-mini","gpt-4.1-mini":"gpt-41-mini","gpt-4o":"gpt-41-mini","gpt-4o-mini":"gpt-41-mini","prebuilt-analyzer-completion":"gpt-41-mini","prebuilt-analyzer-completion-mini":"gpt-41-mini","prebuilt-analyzer-embedding":"text-embedding-3-large","text-embedding-3-large":"text-embedding-3-large"}}' -Encoding utf8NoBOM
        $cuUrl = "${cuEndpoint}contentunderstanding/defaults?api-version=2025-11-01"
        az rest --method PATCH --url $cuUrl --headers "Content-Type=application/json" "Authorization=Bearer $token" --body "@$cuBodyPath"
        if ($LASTEXITCODE -ne 0) { Write-Host "WARNING: CU defaults configuration failed" }
        Remove-Item $cuBodyPath -ErrorAction SilentlyContinue
        Write-Host "=== Content Understanding defaults configured ==="

        # 2. Create Foundry Agent Service agents
        Write-Host "=== Creating Foundry agents ==="
        $env:AI_FOUNDRY_ENDPOINT = (azd env get-value AI_FOUNDRY_ENDPOINT)
        $env:AI_FOUNDRY_PROJECT_NAME = (azd env get-value AI_FOUNDRY_PROJECT_NAME)
        pip install azure-ai-projects azure-identity --quiet 2>$null
        python scripts/create_agents.py
        if ($LASTEXITCODE -ne 0) { Write-Host "WARNING: Agent creation failed" }
        Write-Host "=== Agent setup complete ==="

        # 3. Create vector search container (may retry if capability still propagating)
        Write-Host "=== Creating vector search container ==="
        $env:COSMOS_DB_ACCOUNT_NAME = (azd env get-value COSMOS_DB_ACCOUNT_NAME)
        $env:AZURE_RESOURCE_GROUP = $rgName
        python scripts/create_vector_container.py
        if ($LASTEXITCODE -ne 0) { Write-Host "WARNING: Vector container creation failed" }
        Write-Host "=== Vector search container setup complete ==="
    posix:
      shell: sh
      run: |
        RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP)

        # 0. Deploy MCP server via management-plane API (avoids blob RBAC requirement)
        echo "=== Deploying MCP server ==="
        MCP_FUNC_NAME=$(azd env get-value MCP_FUNCTION_APP_NAME)
        MCP_ZIP=$(mktemp /tmp/mcp-server-deploy-XXXXXX.zip)
        (cd src/mcp-server && zip -r "$MCP_ZIP" .)
        az functionapp deployment source config-zip --resource-group "$RG_NAME" --name "$MCP_FUNC_NAME" --src "$MCP_ZIP" --build-remote true || echo "WARNING: MCP server deployment failed"
        rm -f "$MCP_ZIP"
        echo "=== MCP server deployed ==="

        # 1. Configure Content Understanding default model deployments
        echo "=== Configuring Content Understanding defaults ==="
        CU_ENDPOINT=$(azd env get-value AI_FOUNDRY_ENDPOINT)
        TOKEN=$(az account get-access-token --resource "https://cognitiveservices.azure.com" --query accessToken -o tsv)
        CU_BODY_FILE=$(mktemp)
        echo '{"modelDeployments":{"gpt-4.1":"gpt-41-mini","gpt-4.1-mini":"gpt-41-mini","gpt-4o":"gpt-41-mini","gpt-4o-mini":"gpt-41-mini","prebuilt-analyzer-completion":"gpt-41-mini","prebuilt-analyzer-completion-mini":"gpt-41-mini","prebuilt-analyzer-embedding":"text-embedding-3-large","text-embedding-3-large":"text-embedding-3-large"}}' > "$CU_BODY_FILE"
        az rest --method PATCH --url "${CU_ENDPOINT}contentunderstanding/defaults?api-version=2025-11-01" \
          --headers "Content-Type=application/json" "Authorization=Bearer $TOKEN" --body "@$CU_BODY_FILE" || true
        rm -f "$CU_BODY_FILE"
        echo "=== Content Understanding defaults configured ==="

        # 2. Create Foundry Agent Service agents
        echo "=== Creating Foundry agents ==="
        export AI_FOUNDRY_ENDPOINT=$(azd env get-value AI_FOUNDRY_ENDPOINT)
        export AI_FOUNDRY_PROJECT_NAME=$(azd env get-value AI_FOUNDRY_PROJECT_NAME)
        pip install azure-ai-projects azure-identity --quiet 2>/dev/null
        python scripts/create_agents.py || true
        echo "=== Agent setup complete ==="

        # 3. Create vector search container
        echo "=== Creating vector search container ==="
        export COSMOS_DB_ACCOUNT_NAME=$(azd env get-value COSMOS_DB_ACCOUNT_NAME)
        export AZURE_RESOURCE_GROUP="$RG_NAME"
        python scripts/create_vector_container.py || true
        echo "=== Vector search container setup complete ==="

services:
  backend:
    project: ./src/backend
    host: appservice
    language: python
    hooks:
      predeploy:
        windows:
          shell: pwsh
          run: |
            $clientId = (azd env get-value ENTRA_CLIENT_ID)
            $tenantId = (azd env get-value ENTRA_TENANT_ID)
            if (Test-Path static) { Remove-Item -Recurse -Force static }
            Copy-Item -Recurse ../frontend static
            $configPath = "static/js/config.js"
            (Get-Content $configPath -Raw).Replace("__ENTRA_CLIENT_ID__", $clientId).Replace("__ENTRA_TENANT_ID__", $tenantId) | Set-Content $configPath
        posix:
          shell: sh
          run: |
            CLIENT_ID=$(azd env get-value ENTRA_CLIENT_ID)
            TENANT_ID=$(azd env get-value ENTRA_TENANT_ID)
            rm -rf static
            cp -r ../frontend static
            sed -i "s/__ENTRA_CLIENT_ID__/$CLIENT_ID/g" static/js/config.js
            sed -i "s/__ENTRA_TENANT_ID__/$TENANT_ID/g" static/js/config.js
  # mcp-server is deployed via postdeploy hook using az functionapp deployment source config-zip
  # (management-plane API) to avoid requiring Storage Blob Data Contributor for the deployer.
